<html>
    <head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">      
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div id="Main">
            <div>
                <h1 id="title">SCOREBOARD</h1>
            </div>
            <div id="Teams-container">
                <div id="home-team" class="teams">
                    <h1 class="header">Home</h1>
                    <p class="score" id="home-team-score">0</p>
                    <div class="buttons">
                        <button class="plus-btn btn" onclick="HomeAdd(1)"> + 1</button>
                        <button class="plus-btn btn" onclick="HomeAdd(2)"> + 2</button>
                        <button class="plus-btn btn" onclick="HomeAdd(3)"> + 3</button>
                    </div>
                </div>
                <div id="Guest-team" class="teams">
                    <h1 class="header">Guest</h1>
                    <p class="score" id="guest-team-score">2</p>
                    <div class="buttons">
                        <button class="plus-btn btn btn" onclick="GuestAdd(1)"> + 1</button>
                        <button class="plus-btn btn btn" onclick="GuestAdd(2)"> + 2</button>
                        <button class="plus-btn btn btn" onclick="GuestAdd(3)"> + 3</button>
                    </div>
                </div>
            </div>
            <div id="new-game-div">
                <button class="btn" id="new-game-btn" onclick="resetAll()"> New Game </button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
